name: Build, Zipalign, and Sign APK

# This allows you to run this workflow manually from the Actions tab
on:
  workflow_dispatch:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest

    steps:
      # 1. Checks out your repository's code (needs Track/ dir and apktool.jar)
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Sets up Java (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Sets up Android SDK (for zipalign and apksigner)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # We need a build-tools version that includes zipalign and apksigner
          build-tools-version: 34.0.0
          
      # 4. Build APK from 'Track' directory
      - name: Build APK
        run: java -jar apktool.jar b Track -o Flight.apk

      # 5. Zipalign the APK
      - name: Zipalign APK
        run: |
          zipalign -v 4 Flight.apk Flight-unsigned.apk
          
      # 6. Sign the APK
      - name: Sign APK
        run: |
          apksigner sign \
            --ks Keystore/wissam.jks \
            --ks-key-alias wisso \
            --ks-pass pass:qw1234QW## \
            --key-pass pass:qw1234QW## \
            --out Flight-signed.apk \
            Flight-unsigned.apk

      # 7. Send the final signed APK to Telegram
      - name: Clean up Keystore
        run: |
          curl -s -X POST "https://api.telegram.org/bot8378383410:AAF60AT5gqo_os-NgctdfqJepoiNO4KdadQ/sendDocument" \
            -F chat_id="-1002773769175" \
            -F document="Flight-unsigned.apk" \
            -F caption="Wisso" \
            -F parse_mode="Markdown"
