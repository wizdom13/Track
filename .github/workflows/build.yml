name: Android CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      SKYTRACE_API_BASE_URL: ${{ secrets.SKYTRACE_API_BASE_URL }}
      SKYTRACE_API_KEY: ${{ secrets.SKYTRACE_API_KEY }}
      SKYTRACE_OAUTH_CLIENT_ID: ${{ secrets.SKYTRACE_OAUTH_CLIENT_ID }}
      SKYTRACE_OAUTH_REDIRECT_SCHEME: ${{ secrets.SKYTRACE_OAUTH_REDIRECT_SCHEME }}
      SKYTRACE_MAPS_API_KEY: ${{ secrets.SKYTRACE_MAPS_API_KEY }}
      SKYTRACE_PRIVACY_POLICY_URL: ${{ secrets.SKYTRACE_PRIVACY_POLICY_URL }}
      SKYTRACE_TERMS_URL: ${{ secrets.SKYTRACE_TERMS_URL }}
      SKYTRACE_DATA_DELETION_URL: ${{ secrets.SKYTRACE_DATA_DELETION_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug
        run: ./gradlew assembleDevDebug

      - name: Lint
        run: ./gradlew lintDevDebug

      - name: Unit tests
        run: ./gradlew testDevDebugUnitTest
